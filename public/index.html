<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet365 - Football Betting</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">Bet365</div>
        <div class="nav-links" id="navLinks">
          <!-- Populated by JS -->
        </div>
      </div>
    </nav>

    <!-- Auth Section -->
    <section id="authSection" class="auth-section">
      <div class="auth-container">
        <div class="auth-card">
          <h1>Welcome to Bet365</h1>
          <p>The best football betting platform</p>

          <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="loginUsername" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <p class="auth-link">Don't have an account? <a href="#" id="showRegister">Register</a></p>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="auth-form hidden">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="registerUsername" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="registerEmail" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="registerPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
            <p class="auth-link">Already have an account? <a href="#" id="showLogin">Login</a></p>
          </form>
        </div>
      </div>
    </section>

    <!-- Main Content -->
    <main id="mainContent" class="main-content hidden">
      <!-- User Info Bar -->
      <div class="user-info-bar">
        <span>Welcome, <span id="usernameDisplay"></span></span>
        <span class="balance">Balance: $<span id="balanceDisplay">0.00</span></span>
      </div>

      <!-- Matches Section -->
      <section class="matches-section">
        <h2>Upcoming Matches</h2>
        <div class="matches-grid" id="matchesGrid">
          <!-- Matches populated by JS -->
        </div>
      </section>

      <!-- Bets Section -->
      <section class="bets-section">
        <h2>My Bets</h2>
        <div class="bets-list" id="betsList">
          <!-- Bets populated by JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- Bet Modal -->
  <div id="betModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Place Your Bet</h2>
      <div class="bet-details" id="betDetails"></div>
      <form id="betForm" class="bet-form">
        <div class="form-group">
          <label>Selection</label>
          <select id="betSelection" required>
            <option value="home">Home Win</option>
            <option value="draw">Draw</option>
            <option value="away">Away Win</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="betAmount" min="1" step="0.01" required>
        </div>
        <div class="bet-preview">
          <p>Odds: <span id="betOdds">-</span></p>
          <p>Potential Payout: $<span id="betPayout">0.00</span></p>
        </div>
        <button type="submit" class="btn btn-success">Place Bet</button>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="/js/app.js"></script>
</body>
</html>
