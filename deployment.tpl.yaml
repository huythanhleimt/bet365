---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${CONTAINER_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${CONTAINER_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${CONTAINER_NAME}
  template:
    metadata:
      labels:
        app: ${CONTAINER_NAME}
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: ${CONTAINER_NAME}
